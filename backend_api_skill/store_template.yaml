# 此文件展示所有可用配置项及其说明
# 实际使用的配置文件位于: config/store.yaml

# ============================================
# 服务器基础配置
# ============================================

# 日志级别: DEBUG / INFO / WARNING / ERROR
log_level: INFO

# 服务器监听地址
# 127.0.0.1: 仅本机访问
host: 127.0.0.1

# 服务器端口号，如果被占用可改为其他端口如 8080, 3000 等
port: 8000

# ============================================
# agent 模式配置 (Mode)
# ============================================

currentMode: outline  # 当前激活的模式: outline / writing / adjustment / 其他自定义模式

# 其实这三个内置的模式是可以删除的
mode:
  # --------------------
  # 细纲模式
  # --------------------
  outline:
    name: 细纲模式                    # 模式显示名称
    builtin: true                     # 是否为内置模式
    prompt: |                         # 系统提示词，定义 AI 的行为
      你是一位小说创作顾问，负责与用户深度沟通本章核心需求。
      ...
    temperature: 0.7                  # 温度参数: 0-2，越高回答越随机
    top_p: 0.7                        # 核采样参数: 0-1，控制输出多样性
    max_tokens: 4096                  # 最大上下文，超出的内容会被自动裁剪丢弃
    additionalInfo:                   # 额外信息，用于填写文件路径列表，内容会自动添加到AI上下文
    - config/skills_config.yaml       # AI技能配置文件
    - config/store.yaml               # 项目核心配置文件
    tools:                            # 该模式可用的工具列表
      - load_unload_file              # 加载/卸载文件到上下文
      - manage_file                   # 文件操作（创建、修改、删除）
      - apply_diff                    # 应用差异补丁修改文件
      - search_text                   # 搜索文本内容
      - ask_user_question             # 向用户提问
      - rag_search                    # 向量搜索
      - rag_list_files                # 列出知识库文件
      - load_skill                    # 加载 Skill
      - execute_command               # 执行命令行命令
    skills:                           # 该模式可用的 Skill 列表
      - baidu-search                  # 百度搜索skill
      - backend-api                   # 后端 API 调用 skill

  # --------------------
  # 写作模式
  # --------------------
  writing:
    name: 写作模式
    builtin: true
    prompt: |
      你是一位专业小说代笔，需严格基于用户提供的【最终版细纲】进行创作...
    temperature: 0.7
    top_p: 0.7
    max_tokens: 4096
    additionalInfo: []
    tools:
      - load_unload_file
    skills: []

  # --------------------
  # 调整模式
  # --------------------
  adjustment:
    name: 调整模式
    builtin: true
    prompt: |
      你是一位资深编辑和小说精修师...
    temperature: 0.7
    top_p: 0.7
    max_tokens: 4096
    additionalInfo: []
    tools:
      - ask_user_question
    skills: []

# ============================================
# 模型提供商配置
# ============================================

provider:
  # --------------------
  # 内置嵌入模型（本地）
  # --------------------
  local:
    name: 内置模型
    builtin: true                   # 是否内置（区分自定义提供商）
    enable: true                    # 是否启用（只有启用才能对话，或者在嵌入面板中发现它的可用嵌入模型）
    url: ""                         # API 地址（本地运行时可为空）
    key: ""                         # API 密钥（本地运行时可为空）
    favoriteModels:                 # 收藏的模型列表
      chat: {}                      # 对话模型
      embedding:                    # 嵌入模型
        Qwen3-Embedding-0.6B-Q8_0:
          dimensions: 1024          # 向量维度
          max-tokens: 32000         # 最大上下文长度
          per-max-tokens: false     # 阿里云特有配置，其他都是false,大概是每个切分片段的最大tokens
      other: {}                     # 后续的拓展字段

  # --------------------
  # DeepSeek
  # --------------------
  deepseek:
    name: deepseek
    builtin: true
    enable: true
    url: https://api.deepseek.com/v1
    key: your-api-key-here          # 替换为你的 API 密钥
    favoriteModels:
      chat:
        deepseek-chat: 128000       # 模型名 + 最大上下文长度
        deepseek-reasoner: 128000
      embedding: {}
      other: {}

  # --------------------
  # 阿里云
  # --------------------
  dashscope:
    name: 阿里云
    builtin: true
    enable: false
    url: https://dashscope.aliyuncs.com/compatible-mode/v1
    key: your-api-key-here
    favoriteModels:
      chat:
        qwen3-max: 256000
        qwen-plus: 1000000
        qwen-flash: 1000000
      embedding:
        text-embedding-v4:
          dimensions: 1024
          max-tokens: false
          per-max-tokens: 8192
      other: {}

  # --------------------
  # 硅基流动
  # --------------------
  siliconflow:
    name: 硅基流动
    builtin: true
    enable: false
    url: https://api.siliconflow.cn/v1
    key: your-api-key-here
    favoriteModels:
      chat:
        deepseek-ai/DeepSeek-V3.2: 160000
      embedding:
        Qwen/Qwen3-Embedding-0.6B:
          dimensions: 1024
          max-tokens: 32000
          per-max-tokens: false
      other: {}


  # --------------------
  # Ollama
  # --------------------
  ollama:
    name: ollama
    builtin: true
    enable: false
    url: http://127.0.0.1:11434
    key: ""
    favoriteModels:
      chat: {}
      embedding: {}
      other: {}

  # --------------------
  # Google Gemini
  # --------------------
  gemini:
    name: Gemini
    builtin: true
    enable: false
    url: https://generativelanguage.googleapis.com
    key: your-api-key-here
    favoriteModels:
      chat:
        gemini-2.5-flash: 1048576
      embedding: {}
      other: {}

  # --------------------
  # 其他提供商省略
  # --------------------

# ============================================
# 当前选择的模型
# ============================================
# 记录用户当前选择的提供商和模型

selectedProvider: ""      # 当前选择的提供商 ID，如 "deepseek", "openai"
selectedModel: ""         # 当前选择的模型名称，如 "deepseek-chat"

# ============================================
# 自动批准设置
# ============================================
# 启用后无需用户手动批准

autoApproveSettings: false

# ============================================
# 对话线程 ID
# ============================================
# 当前对话的唯一标识符，由系统自动生成，格式: thread_时间戳

thread_id: ""

# ============================================
# rag配置
# ============================================
# 知识库配置
knowledgeBase:
  db_1773933705871:                      # 知识库ID
    name: 测试                            # 知识库名
    provider: local                      # 提供商
    model: Qwen3-Embedding-0.6B-Q8_0     # 嵌入模型
    dimensions: 1024                     # 嵌入维度
    chunkSize: 250                       # 每个文档片段的切分大小
    overlapSize: 30                      # 片段之间的重叠大小
    similarity: 0.3                      # 相似度阈值，检索时，超过阈值的结果才会返回
    returnDocs: 10                       # 返回片段数

# 两步rag:与工具rag对应。工具rag由AI决定调用工具，检索内容。两步rag则是指，用户每次对话输入将作为检索词，检索内容并添加到AI的系统提示词。
two-step-rag: db_1773933705871           # 为null则关闭。填写指定知识库ID,表明启动两步rag，每次的用户信息，会从这个知识库检索信息

# ============================================
# MCP 服务器配置
# ============================================
mcpServers:
  '1773934537359':    # 系统默认用时间戳生成id,如果手动修改配置，自定义id，可以是字母/数字等
    name: 爬虫
    description: 来自mcp官方仓库示例，不过大部分网站有反爬机制
    url: ''    # 只有transport为http,sse，才需要url
    isActive: true    # 是否启用
    transport: stdio    # 可以为stdio,http，sse
    command: uvx    # 使用stdio的mcp可填uvx,npx。非本地的mcp，默认uvx（虽然也用不到）
    args:
    - mcp-server-fetch    # 主要是在pypi上的包名
    env: {}    # 一般用于填写API_KEY
    headers: {}    # 认证头，个人自用应该很少用到
  '1773936044270':
    name: 文件系统
    description: 允许ai操作文件，不过与我们的内置工具有些重合
    url: ''
    isActive: true
    transport: stdio
    command: npx
    args:
    - -y    # 下载时自动同意
    - '@modelcontextprotocol/server-filesystem'    # 包名
    - /home/denghuo/文档/ai-novelist/backend/data    # mcp服务器要求的其他args
    env: {}
    headers: {}
  '1773936944115':
    name: 魔搭http爬虫
    description: http示例
    url: https://mcp.api-inference.modelscope.net/用户部署的地址/mcp    # 这个可以在魔搭等网站获取url,如果没有“/mcp”，需要添加到后面
    isActive: true
    transport: http
    command: uvx
    args: []
    env: {}
    headers: {}
  '1773937179320':
    name: 魔搭sse高德
    description: sse示例
    url: https://mcp.api-inference.modelscope.net/用户部署的地址/sse    # 同理，没有“/sse”则需要手动添加
    isActive: true
    transport: sse
    command: uvx
    args: []
    env: {}
    headers: {}
  '1773937582695':
    name: 高德本地
    description: 本地示例
    url: ''
    isActive: true
    transport: stdio
    command: npx
    args:
    - -y
    - '@amap/amap-maps-mcp-server'
    env:
      AMAP_MAPS_API_KEY: 123456    # 用户自己的api key
    headers: {}